name: Send Push Notifications

on:
  schedule:
    # Every day at 09:00 UTC — morning reminder
    - cron: '0 9 * * *'
    # Every day at 20:00 UTC — streak warning check
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type (morning | streak)'
        required: true
        default: 'morning'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install web-push

      - name: Send push notifications
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NOTIFY_TYPE: ${{ github.event.inputs.type || 'auto' }}
        run: node .github/scripts/send-push.js
